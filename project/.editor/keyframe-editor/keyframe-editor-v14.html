<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에너지 긴축모드 - 애니메이션 에디터 V14 (직선 구르기)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root { --bg-panel: #2a2a2a; --color-accent: #6B9682; --text-main: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Pretendard', sans-serif; background: #1a1a1a; color: var(--text-main); overflow: hidden; }
        
        /* 레이아웃 */
        .layout { display: grid; grid-template-columns: 300px 1fr 320px; height: 100vh; }
        .panel { background: var(--bg-panel); border-right: 1px solid #444; display: flex; flex-direction: column; z-index: 10; }
        .panel.right { border-left: 1px solid #444; border-right: none; }
        .panel-header { padding: 15px; background: #222; border-bottom: 2px solid var(--color-accent); font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { padding: 15px; overflow-y: auto; flex: 1; }

        /* 캔버스 */
        .canvas-area { position: relative; background: linear-gradient(180deg, #CEDDD6 0%, #A8C8BB 100%); overflow: hidden; cursor: crosshair; }
        .stage-center { position: absolute; top: 50%; left: 50%; width: 0; height: 0; }
        .grid { position: absolute; top: -50vh; left: -50vw; width: 100vw; height: 100vh; pointer-events: none; 
            background-image: linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px); 
            background-size: 50px 50px; transition: opacity 0.3s; }
        .axis { position: absolute; background: rgba(255,0,0,0.3); pointer-events: none; transition: opacity 0.3s; }
        .axis-x { width: 100vw; height: 1px; left: -50vw; top: 0; }
        .axis-y { width: 1px; height: 100vh; left: 0; top: -50vh; }

        /* 캐릭터 & 고스트 */
        #rock { position: absolute; width: 280px; transform: translate(-50%, 0); top: 0; opacity: 0.8; pointer-events: none; }
        .hana-wrapper { position: absolute; top: 0; left: 0; width: 0; height: 0; pointer-events: none; z-index: 20; }
        .hana-sprite { position: absolute; width: 80px; transform: translate(-50%, -100%); bottom: 0; left: 0; transform-origin: center bottom; } /* 스케일 기준점 하단 고정 */
        
        #ghost-layer { transition: opacity 0.3s ease; }
        .canvas-area.is-playing #ghost-layer { opacity: 0 !important; pointer-events: none; }
        .canvas-area.is-playing .grid { opacity: 0.3; }
        .canvas-area.is-playing .axis { opacity: 0; }

        .ghost { position: absolute; width: 80px; opacity: 0.5; transform: translate(-50%, -100%); cursor: grab; z-index: 30; filter: grayscale(1); transition: opacity 0.2s, filter 0.2s; transform-origin: center bottom; }
        .ghost:hover { opacity: 0.8; filter: grayscale(0); border: 1px dashed rgba(255,255,255,0.5); }
        .ghost.selected { opacity: 1; filter: grayscale(0); border: 2px solid var(--color-accent); z-index: 100; }
        .ghost img { width: 100%; display: block; pointer-events: none; }
        .ghost-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: black; color: white; padding: 2px 5px; font-size: 10px; border-radius: 4px; white-space: nowrap; }

        /* UI 컨트롤 */
        .btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-bottom: 6px; color: white; transition: 0.2s; font-size: 13px; }
        .btn-green { background: #6B9682; } .btn-green:hover { background: #5A8A71; }
        .btn-blue { background: #5476a8; }
        .btn-red { background: #d65a5a; }
        .btn-dark { background: #444; border: 1px solid #666; }
        .row { display: flex; gap: 5px; margin-bottom: 8px; }
        .input-group { flex: 1; }
        .label { font-size: 11px; color: #aaa; display: block; margin-bottom: 3px; }
        input, select { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 6px; border-radius: 4px; font-size: 12px; }
        input:focus { border-color: var(--color-accent); outline: none; }

        /* 리스트 아이템 */
        .list-item { background: #333; padding: 10px; margin-bottom: 6px; border-radius: 6px; border-left: 3px solid transparent; cursor: grab; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s, transform 0.2s; }
        .list-item:hover { background: #3c3c3c; }
        .list-item.active { background: #2f3834; border-left-color: var(--color-accent); }
        .list-item.dragging { opacity: 0.5; background: #444; }
        .list-item.drag-over { border-top: 2px solid var(--color-accent); transform: translateY(2px); }
        
        .item-text { font-size: 12px; pointer-events: none; }
        .item-del { color: #888; background: none; border: none; cursor: pointer; padding: 5px; font-size: 14px; }
        .item-del:hover { color: #ff5555; }

        /* 이미지 그리드 */
        .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-top: 10px; }
        .img-card { position: relative; aspect-ratio: 1; background: #333; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; }
        .img-card.active { border-color: var(--color-accent); }
        .img-card img { width: 100%; height: 100%; object-fit: contain; }
        .img-del { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.7); color: white; border: none; width: 20px; height: 20px; cursor: pointer; font-size: 12px; display: none; }
        .img-card:hover .img-del { display: block; }
        .img-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); font-size: 9px; text-align: center; padding: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; }
        .toast.show { opacity: 1; bottom: 30px; }
    </style>
</head>
<body>

<div class="layout">
    <div class="panel">
        <div class="panel-header">
            <span>🎬 동작 순서</span>
            <span style="font-size:11px; color:#888;">V14 - 직선구르기</span>
        </div>
        <div class="panel-content">
            <button class="btn btn-green" onclick="addKeyframe()">+ 동작 추가</button>
            <div id="kf-list"></div>
        </div>
        <div style="padding: 15px; border-top: 1px solid #444;">
            <div class="row">
                <button class="btn btn-blue" onclick="playAnim()">▶️ 재생 (Space)</button>
                <button class="btn btn-dark" onclick="stopAnim()">⏹️ 정지</button>
            </div>
            <div class="row">
                <button class="btn btn-dark" onclick="saveProject()">💾 프로젝트 저장</button>
                <button class="btn btn-dark" onclick="document.getElementById('json-load').click()">📂 불러오기</button>
                <input type="file" id="json-load" accept=".json" style="display:none" onchange="loadProject(this)">
            </div>
            <button class="btn btn-green" onclick="exportCode()">📋 개발용 코드 복사</button>
        </div>
    </div>

    <div class="canvas-area" id="canvas" onmousedown="deselectAll(event)">
        <div class="stage-center">
            <div class="grid"></div>
            <div class="axis axis-x"></div>
            <div class="axis axis-y"></div>
            
            <img src="assets/bg_lv1.png" id="rock">
            <div id="ghost-layer"></div>
            <div id="hana-wrapper" class="hana-wrapper">
                <img src="" id="hana-img" class="hana-sprite">
            </div>
        </div>
        <div style="position: absolute; bottom: 10px; left: 10px; font-size: 12px; color: rgba(255,255,255,0.5); pointer-events: none;">
            💡 Tip: 항목을 드래그해 순서 변경 가능
        </div>
    </div>

    <div class="panel right">
        <div class="panel-header">⚙️ 속성</div>
        <div class="panel-content" id="props-panel" style="display:none">
            <div class="row">
                <div class="input-group">
                    <label class="label">X (좌우)</label>
                    <input type="number" id="inp-x" onchange="updateVal('x')">
                </div>
                <div class="input-group">
                    <label class="label">Y (상하, -가 위)</label>
                    <input type="number" id="inp-y" onchange="updateVal('y')">
                </div>
            </div>
            <div class="row">
                <div class="input-group">
                    <label class="label">Scale X</label>
                    <input type="number" id="inp-scaleX" step="0.1" onchange="updateVal('scaleX')">
                </div>
                <div class="input-group">
                    <label class="label">Scale Y</label>
                    <input type="number" id="inp-scaleY" step="0.1" onchange="updateVal('scaleY')">
                </div>
            </div>
            <div class="row">
                <div class="input-group">
                    <label class="label">Rotation (회전, -는 반시계)</label>
                    <input type="number" id="inp-rotation" step="30" onchange="updateVal('rotation')">
                </div>
            </div>
            <div class="row">
                <div class="input-group">
                    <label class="label">Duration (초)</label>
                    <input type="number" id="inp-duration" step="0.1" onchange="updateVal('duration')">
                </div>
                <div class="input-group">
                    <label class="label">Ease (가속도)</label>
                    <select id="inp-ease" onchange="updateVal('ease')">
                        <option value="linear">linear (일정)</option>
                        <option value="power1.out">power1.out (감속)</option>
                        <option value="power1.in">power1.in (가속)</option>
                        <option value="power2.out">power2.out (점프 도약)</option>
                        <option value="power2.in">power2.in (낙하)</option>
                        <option value="back.out(1.7)">back.out (튀어오름)</option>
                        <option value="elastic.out(1, 0.3)">elastic (젤리)</option>
                    </select>
                </div>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid #444; padding-top: 15px;">
                <label class="label" style="font-size: 13px; color: white; margin-bottom: 10px;">이미지 선택</label>
                <button class="btn btn-dark" onclick="document.getElementById('img-upload').click()">+ 이미지 불러오기</button>
                <input type="file" id="img-upload" multiple accept="image/*" style="display:none" onchange="handleFiles(this.files)">
                <div id="img-grid" class="img-grid"></div>
            </div>
        </div>
        <div id="empty-msg" style="padding: 20px; text-align: center; color: #666; font-size: 13px;">
            키프레임을 추가하거나<br>고스트를 선택하세요.
        </div>
        <div style="padding: 15px; border-top: 2px solid #444; background: #1a1a1a;">
            <div style="font-size: 13px; font-weight: 700; color: var(--color-accent); margin-bottom: 10px;">🌀 직선 구르기 생성</div>
            <div class="row">
                <div class="input-group">
                    <label class="label">시작 X</label>
                    <input type="number" id="roll-cx" value="-400">
                </div>
                <div class="input-group">
                    <label class="label">시작 Y (바닥)</label>
                    <input type="number" id="roll-cy" value="250">
                </div>
            </div>
            <div class="row">
                <div class="input-group">
                    <label class="label">이동 거리</label>
                    <input type="number" id="roll-radius" value="400">
                </div>
                <div class="input-group">
                    <label class="label">프레임 수</label>
                    <input type="number" id="roll-frames" value="12" min="2">
                </div>
            </div>
            <div class="row">
                <div class="input-group">
                    <label class="label">시작 각도</label>
                    <input type="number" id="roll-start" value="0" step="30">
                </div>
                <div class="input-group">
                    <label class="label">끝 각도</label>
                    <input type="number" id="roll-end" value="360" step="30">
                </div>
            </div>
            <div class="row">
                <div class="input-group">
                    <label class="label">Duration (초)</label>
                    <input type="number" id="roll-dur" value="0.3" step="0.1">
                </div>
            </div>
            <button class="btn btn-green" onclick="generateRoll()">생성하기</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">알림</div>

<script>
    let keyframes = []; let images = {}; let selectedIdx = -1;

    window.onload = () => {
        loadFromLocal(); 
        if(keyframes.length === 0) addKeyframe();
        render();
    };

    function handleFiles(files) {
        Array.from(files).forEach(file => { images[file.name] = URL.createObjectURL(file); });
        renderImages(); render();
    }
    function removeImage(name) { if(confirm(`삭제?`)) { delete images[name]; renderImages(); } }

    function addKeyframe() {
        const last = keyframes[keyframes.length-1];
        keyframes.push({
            x: last ? last.x + 50 : 0, y: last ? last.y : 0,
            scaleX: last ? last.scaleX : 1, scaleY: last ? last.scaleY : 1,
            rotation: last ? last.rotation : 0,
            duration: 0.5, ease: "power1.out",
            image: last ? last.image : (Object.keys(images)[0] || "")
        });
        selectKf(keyframes.length-1); saveToLocal();
    }

    function generateRoll() {
        const startX = parseFloat(document.getElementById('roll-cx').value);
        const startY = parseFloat(document.getElementById('roll-cy').value);
        const distance = parseFloat(document.getElementById('roll-radius').value);
        const endX = startX + distance;
        
        const frames = parseInt(document.getElementById('roll-frames').value);
        const startAngle = parseFloat(document.getElementById('roll-start').value);
        const endAngle = parseFloat(document.getElementById('roll-end').value);
        const duration = parseFloat(document.getElementById('roll-dur').value);
        
        const currentImage = keyframes.length > 0 ? keyframes[keyframes.length-1].image : (Object.keys(images)[0] || "");
        
        keyframes = [];
        
        for (let i = 0; i < frames; i++) {
            const progress = i / (frames - 1);
            
            const x = Math.round(startX + (endX - startX) * progress);
            const y = startY;
            const rotation = Math.round(startAngle + (endAngle - startAngle) * progress);
            
            keyframes.push({
                x: x,
                y: y,
                scaleX: 1,
                scaleY: 1,
                rotation: rotation,
                duration: duration,
                ease: "linear",
                image: currentImage
            });
        }
        
        selectedIdx = -1;
        render();
        saveToLocal();
        
        const toast = document.getElementById('toast');
        toast.textContent = `직선 구르기 ${frames}프레임 생성 완료!`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }


    function removeKf(idx, e) {
        if(e) e.stopPropagation();
        if(confirm(`삭제?`)) {
            keyframes.splice(idx, 1);
            if(keyframes.length === 0) selectedIdx = -1;
            else if(selectedIdx >= idx) selectedIdx = Math.max(0, selectedIdx - 1);
            render(); saveToLocal();
        }
    }

    function selectKf(idx) { selectedIdx = idx; render(); }

    function updateVal(key) {
        if(selectedIdx < 0) return;
        const el = document.getElementById(`inp-${key}`); // ID 매칭 수정
        let val = el.value;
        if(key !== 'ease') val = parseFloat(val);
        keyframes[selectedIdx][key] = val;
        
        const ghost = document.getElementById(`ghost-${selectedIdx}`);
        if(ghost) updateGhostStyle(ghost, keyframes[selectedIdx]);
        saveToLocal();
    }

    function setImage(name) {
        if(selectedIdx < 0) return;
        keyframes[selectedIdx].image = name; render(); saveToLocal();
    }

    function render() { renderList(); renderGhosts(); renderProps(); renderImages(); }

    // --- 드래그 로직 ---
    let dragSrcIdx = -1;
    function renderList() {
        const list = document.getElementById('kf-list'); list.innerHTML = '';
        keyframes.forEach((kf, i) => {
            const div = document.createElement('div');
            div.className = `list-item ${i === selectedIdx ? 'active' : ''}`;
            div.draggable = true;
            div.innerHTML = `
                <div class="item-text"><strong>#${i+1}</strong> ${kf.image}<br><span style="color:#888">${kf.duration}s / ${kf.ease}</span></div>
                <button class="item-del" onclick="removeKf(${i}, event)">🗑️</button>
            `;
            div.onclick = () => selectKf(i);
            div.addEventListener('dragstart', (e) => { dragSrcIdx = i; e.currentTarget.classList.add('dragging'); });
            div.addEventListener('dragover', (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); });
            div.addEventListener('dragleave', (e) => e.currentTarget.classList.remove('drag-over'));
            div.addEventListener('drop', (e) => {
                e.stopPropagation();
                if (dragSrcIdx !== i) {
                    const item = keyframes.splice(dragSrcIdx, 1)[0];
                    keyframes.splice(i, 0, item);
                    if (selectedIdx === dragSrcIdx) selectedIdx = i;
                    else if (selectedIdx > dragSrcIdx && selectedIdx <= i) selectedIdx--;
                    else if (selectedIdx < dragSrcIdx && selectedIdx >= i) selectedIdx++;
                    render(); saveToLocal();
                }
            });
            div.addEventListener('dragend', (e) => { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.list-item').forEach(el=>el.classList.remove('drag-over')); });
            list.appendChild(div);
        });
    }

    function renderGhosts() {
        const layer = document.getElementById('ghost-layer'); layer.innerHTML = '';
        keyframes.forEach((kf, i) => {
            const div = document.createElement('div');
            div.id = `ghost-${i}`;
            div.className = `ghost ${i === selectedIdx ? 'selected' : ''}`;
            const src = images[kf.image];
            div.innerHTML = src ? `<img src="${src}" draggable="false">` : `<div style="width:50px;height:50px;bg:rgba(255,0,0,0.2);">?</div>`;
            div.innerHTML += `<div class="ghost-label">${i+1}</div>`;
            updateGhostStyle(div, kf);
            div.onmousedown = (e) => startDrag(e, i);
            div.onwheel = (e) => handleWheel(e, i);
            layer.appendChild(div);
        });
    }

    function updateGhostStyle(div, kf) {
        div.style.transform = `translate(calc(-50% + ${kf.x}px), calc(-100% + ${kf.y}px)) scale(${kf.scaleX}, ${kf.scaleY}) rotate(${kf.rotation}deg)`;
    }

    function renderProps() {
        const panel = document.getElementById('props-panel');
        const empty = document.getElementById('empty-msg');
        if(selectedIdx < 0) { panel.style.display = 'none'; empty.style.display = 'block'; return; }
        panel.style.display = 'block'; empty.style.display = 'none';

        const kf = keyframes[selectedIdx];
        document.getElementById('inp-x').value = kf.x;
        document.getElementById('inp-y').value = kf.y;
        document.getElementById('inp-scaleX').value = kf.scaleX;
        document.getElementById('inp-scaleY').value = kf.scaleY;
        document.getElementById('inp-rotation').value = kf.rotation;
        document.getElementById('inp-duration').value = kf.duration;
        document.getElementById('inp-ease').value = kf.ease;
    }

    function renderImages() {
        const grid = document.getElementById('img-grid'); grid.innerHTML = '';
        const currentImg = selectedIdx >= 0 ? keyframes[selectedIdx].image : null;
        Object.keys(images).forEach(name => {
            const div = document.createElement('div');
            div.className = `img-card ${name === currentImg ? 'active' : ''}`;
            div.innerHTML = `<img src="${images[name]}"><button class="img-del" onclick="event.stopPropagation(); removeImage('${name}')">✕</button><div class="img-name">${name}</div>`;
            div.onclick = () => setImage(name);
            grid.appendChild(div);
        });
    }

    let isDragging = false, dragIdx = -1, startPos = {x:0, y:0}, startObj = {x:0, y:0};
    function startDrag(e, idx) {
        if(e.button !== 0) return;
        e.stopPropagation(); selectKf(idx);
        isDragging = true; dragIdx = idx;
        startPos = { x: e.clientX, y: e.clientY };
        startObj = { x: keyframes[idx].x, y: keyframes[idx].y };
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);
    }
    function onDrag(e) {
        if(!isDragging) return;
        const dx = e.clientX - startPos.x;
        const dy = e.clientY - startPos.y;
        keyframes[dragIdx].x = Math.round(startObj.x + dx);
        keyframes[dragIdx].y = Math.round(startObj.y + dy);
        document.getElementById('inp-x').value = keyframes[dragIdx].x;
        document.getElementById('inp-y').value = keyframes[dragIdx].y;
        updateGhostStyle(document.getElementById(`ghost-${dragIdx}`), keyframes[dragIdx]);
        renderList(); // 좌표 텍스트 갱신
    }
    function stopDrag() { if(isDragging) saveToLocal(); isDragging = false; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); }

    function handleWheel(e, idx) {
        e.preventDefault(); e.stopPropagation();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        let newScale = parseFloat((keyframes[idx].scaleX + delta).toFixed(1));
        if(newScale < 0.1) newScale = 0.1;
        keyframes[idx].scaleX = newScale; keyframes[idx].scaleY = newScale;
        if(selectedIdx === idx) {
            document.getElementById('inp-scaleX').value = newScale;
            document.getElementById('inp-scaleY').value = newScale;
        }
        updateGhostStyle(document.getElementById(`ghost-${idx}`), keyframes[idx]);
        saveToLocal();
    }

    function deselectAll(e) { if(e.target.id === 'canvas') { selectedIdx = -1; render(); } }

    let tl;
    function playAnim() {
        if(keyframes.length === 0) return;
        stopAnim();
        document.getElementById('canvas').classList.add('is-playing');
        const wrapper = document.getElementById('hana-wrapper');
        const img = document.getElementById('hana-img');
        const start = keyframes[0];
        const startSrc = images[start.image];
        if(!startSrc) { alert("이미지 필요!"); return; }
        
        tl = gsap.timeline({ onComplete: () => { document.getElementById('canvas').classList.remove('is-playing'); } });
        tl.set(wrapper, { x: 0, y: start.y })
          .set(img, { 
              attr:{src: startSrc}, 
              x: start.x,
              scaleX: start.scaleX, 
              scaleY: start.scaleY, 
              rotation: start.rotation || 0,
              transformOrigin: "center bottom"
          });

        for(let i=1; i<keyframes.length; i++) {
            const curr = keyframes[i];
            const moveSrc = images[curr.image] || ""; 
            tl.to(wrapper, {
                y: curr.y, 
                duration: curr.duration, 
                ease: curr.ease,
                onStart: () => { if(moveSrc) img.src = moveSrc; }
            }, ">");
            tl.to(img, { 
                x: curr.x,
                scaleX: curr.scaleX, 
                scaleY: curr.scaleY, 
                rotation: curr.rotation || 0,
                transformOrigin: "50% 50%",
                duration: curr.duration, 
                ease: curr.ease 
            }, "<");
        }
    }
    function stopAnim() { if(tl) tl.kill(); gsap.set("#hana-wrapper", {clearProps:"all"}); document.getElementById('canvas').classList.remove('is-playing'); }
    document.addEventListener('keydown', e => { if(e.code === 'Space') { e.preventDefault(); playAnim(); } });
    function saveToLocal() { localStorage.setItem('hana_editor_v14_data', JSON.stringify(keyframes)); }
    function loadFromLocal() { const data = localStorage.getItem('hana_editor_v14_data'); if(data) keyframes = JSON.parse(data); }
    function exportCode() { const json = JSON.stringify(keyframes, null, 2); navigator.clipboard.writeText(json); alert("코드 복사 완료!"); console.log(json); }
    function saveProject() { const anchor = document.createElement('a'); anchor.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(keyframes)); anchor.download = "hana_animation.json"; anchor.click(); }
    function loadProject(input) { const file = input.files[0]; if(!file)return; const r = new FileReader(); r.onload = (e) => { try { keyframes = JSON.parse(e.target.result); selectedIdx = -1; render(); saveToLocal(); alert("이미지 다시 로드 필요"); } catch(err){alert("오류");} }; r.readAsText(file); }
</script>
</body>
</html>
